<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institut Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .message-image { max-width: 200px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden text-gray-800">

    <!-- Auth / Settings Modal -->
    <div id="authModal" class="absolute inset-0 bg-gray-900 bg-opacity-75 flex justify-center items-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-[400px] max-w-full">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600"><i class="fas fa-university"></i> Institut Messenger</h2>
            
            <div class="hidden">
                <label class="block text-sm font-medium mb-1 text-gray-600">Markaziy Server IP</label>
                <input type="text" id="serverIp" class="w-full border px-3 py-2 rounded focus:outline-none focus:border-blue-500" placeholder="Masalan: 192.168.1.100:8000" value="127.0.0.1:8000">
            </div>

            <div class="hidden">
                <label class="block text-sm font-medium mb-1 text-gray-600">Shaxsiy IP (Sizning IP)</label>
                <input type="text" id="myIp" class="w-full border px-3 py-2 rounded bg-gray-100 focus:outline-none" placeholder="192.168.x.x">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-1 text-gray-600">Ism</label>
                <input type="text" id="firstName" class="w-full border px-3 py-2 rounded focus:outline-none focus:border-blue-500" placeholder="Ismingizni kiriting...">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1 text-gray-600">Familiya</label>
                <input type="text" id="lastName" class="w-full border px-3 py-2 rounded focus:outline-none focus:border-blue-500" placeholder="Familiyangizni kiriting...">
            </div>

            <div class="flex flex-col space-y-3">
                <button id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-medium transition shadow-sm">Tizimga Kirish / Ro'yxatdan o'tish</button>
            </div>
            <p id="authError" class="text-red-500 text-sm text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- Audio Call Incoming Modal -->
    <div id="callModal" class="absolute inset-0 bg-gray-900 bg-opacity-80 flex justify-center items-center z-50 hidden">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-[320px] text-center">
            <div class="w-20 h-20 bg-blue-500 rounded-full mx-auto flex items-center justify-center text-white text-3xl mb-4 animate-bounce">
                <i class="fas fa-phone"></i>
            </div>
            <h3 class="text-xl font-bold mb-1" id="callerName">Ism Familiya</h3>
            <p class="text-gray-500 mb-6">Qo'ng'iroq qilmoqda...</p>
            <div class="flex justify-center space-x-4">
                <button id="acceptCallBtn" class="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center hover:bg-green-600 shadow-lg text-xl">
                    <i class="fas fa-phone-alt"></i>
                </button>
                <button id="rejectCallBtn" class="bg-red-500 text-white w-14 h-14 rounded-full flex items-center justify-center hover:bg-red-600 shadow-lg text-xl flex-col line-through">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Active Call UI -->
    <div id="activeCallUI" class="absolute top-4 right-4 bg-gray-900 text-white px-6 py-4 rounded-lg shadow-xl z-50 hidden flex items-center space-x-4 border border-gray-700">
        <div>
            <p class="text-sm text-green-400 font-medium animate-pulse">Suhbat davom etmoqda</p>
            <p class="font-bold" id="activeCallName">Name</p>
        </div>
        <button id="endCallBtn" class="bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center transition">
            <i class="fas fa-phone-slash"></i>
        </button>
        <audio id="remoteAudio" autoplay></audio>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="flex w-full h-full hidden">
        
        <!-- Sidebar -->
        <div class="w-1/3 min-w-[300px] max-w-sm flex flex-col bg-white border-r">
            <!-- Sidebar Header -->
            <div class="px-4 py-3 border-b flex items-center justify-between bg-gray-50 text-gray-800">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-blue-600 text-white font-bold text-lg shadow-sm" id="myAvatar">U</div>
                    <div class="flex flex-col">
                        <span id="myName" class="font-bold text-[15px] leading-tight">Mening Ismim</span>
                        <span id="myIpDisplay" class="text-xs text-gray-500">192.168.x.x</span>
                    </div>
                </div>
                <button id="logoutBtn" class="text-gray-500 hover:text-red-500 transition px-2 py-1 rounded" title="Hisobdan chiqish">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <!-- Search -->
            <div class="p-3 bg-white border-b">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" class="w-full bg-gray-100 text-gray-800 rounded-full pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 transition" placeholder="Qidiruv...">
                </div>
            </div>

            <!-- Chat List -->
            <div id="chatList" class="flex-1 overflow-y-auto bg-white">
                <!-- Chat Items -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col bg-[#e5ddd5] relative" style="background-image: url('https://web.whatsapp.com/img/bg-chat-tile-dark_a4be512e7195b6b733d9110b408f075d.png'); background-blend-mode: overlay; background-color: #f0f2f5;">
            
            <div id="emptyState" class="flex-1 flex items-center justify-center flex-col text-gray-500">
                <div class="bg-white rounded-full p-6 shadow-sm flex items-center justify-center mb-4 text-[#8ba2ac]">
                    <i class="fas fa-comments text-5xl"></i>
                </div>
                <p class="text-sm bg-white px-5 py-2 rounded-full shadow-sm text-gray-600 font-medium tracking-wide">Suhbatni boshlash uchun odamni tanlang</p>
            </div>

            <div id="activeChat" class="flex-1 flex flex-col hidden h-full">
                <!-- Chat Header -->
                <div class="px-5 py-3 border-b bg-white flex items-center justify-between shadow-sm z-10 hover:bg-gray-50 cursor-pointer">
                    <div class="flex items-center space-x-4">
                        <div class="w-11 h-11 rounded-full flex items-center justify-center bg-green-500 text-white font-bold text-lg shadow-sm" id="chatAvatar">C</div>
                        <div>
                            <span id="chatName" class="font-semibold text-[16px] text-gray-800 block">Ism Familiya</span>
                            <span id="chatIp" class="text-xs text-blue-500 font-medium">192.168.x.x</span>
                            <span id="typingIndicator" class="text-xs text-blue-500 hidden font-medium ml-2">yozmoqda...</span>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button id="callBtn" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-green-500 hover:bg-green-50 transition text-lg" title="Telefon qilish">
                            <i class="fas fa-phone-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- Messages container -->
                <div id="messagesList" class="flex-1 overflow-y-auto p-5 space-y-3">
                    <!-- Messages -->
                </div>

                <!-- Input Area -->
                <div class="px-4 py-3 bg-[#f0f2f5] flex items-end space-x-2">
                    <button id="attachBtn" class="p-3 text-gray-500 hover:text-gray-700 transition flex items-center justify-center rounded-full hover:bg-gray-200" title="Fayl yoki Rasm yuborish">
                        <i class="fas fa-paperclip text-xl"></i>
                    </button>
                    <input type="file" id="fileInput" class="hidden">
                    <div class="flex-1 bg-white rounded-xl shadow-sm border-none px-4 py-3">
                        <textarea id="messageInput" rows="1" class="w-full focus:outline-none resize-none bg-transparent" placeholder="Xabar yozing..."></textarea>
                    </div>
                    <button id="sendBtn" class="bg-[#0088cc] text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-[#0077b3] transition shadow-md">
                        <i class="fas fa-paper-plane mr-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-90 z-[100] hidden flex items-center justify-center cursor-pointer" onclick="this.classList.add('hidden')">
        <img id="fullImage" class="max-w-[90%] max-h-[90%] object-contain" src="">
    </div>

    <!-- WebRTC adapter -->
    <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="app.js"></script>
    <script>
        // Fetch local IP for auto-fill using WebRTC trick in browser
        async function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({iceServers: []});
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if (ice && ice.candidate && ice.candidate.candidate) {
                        const myIp = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
                        resolve(myIp);
                        pc.close();
                    }
                };
                setTimeout(() => resolve("127.0.0.1"), 1000); // fallback
            });
        }
        getLocalIP().then(ip => {
            const ipInput = document.getElementById('myIp');
            if(!ipInput.value) ipInput.value = ip;
        });
    </script>
</body>
</html>
